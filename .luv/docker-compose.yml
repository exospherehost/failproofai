services:
  dev-environment:
    build:
      context: .luv
      dockerfile: Dockerfile.dev
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    working_dir: /workspace
    stdin_open: true
    tty: true
    network_mode: host
    environment:
      - FAILPROOFAI_TELEMETRY_DISABLED=1

  docs:
    build:
      context: .luv
      dockerfile: Dockerfile.docs
    volumes:
      - ./docs:/app/docs
    ports:
      - "3000:3000"
    restart: unless-stopped
