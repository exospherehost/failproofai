name: Bug Report
description: Report a bug in Failproof AI
labels: [bug]

body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Run `failproofai`
        2. Navigate to Policies
        3. Click on '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Failproof AI Version
      description: Output of `failproofai --version` or check `package.json`.
      placeholder: "0.0.1"
    validations:
      required: true

  - type: dropdown
    id: node-version
    attributes:
      label: Node.js / Bun Version
      options:
        - "Bun 1.3+"
        - "Node 20"
        - "Node 22"
        - Other
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows (WSL)
        - Other
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or logs.
    validations:
      required: false
